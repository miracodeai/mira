name: Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Describe the user-visible problem first. Avoid jumping straight to a
        proposed solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should Mira handle this? UI, prompt change, new endpoint, etc.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out, and why.

  - type: dropdown
    id: scope
    attributes:
      label: Rough scope
      options:
        - Small (<1 day)
        - Medium (1-3 days)
        - Large (>3 days)
        - Don't know
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I've searched existing issues and didn't find a duplicate.
          required: true

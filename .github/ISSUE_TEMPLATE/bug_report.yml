name: Bug report
description: Something is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more detail, the
        faster we can fix it.

        **Security vulnerabilities should NOT be filed here** — see
        [SECURITY.md](https://github.com/miracodeai/mira/blob/main/SECURITY.md)
        for private disclosure.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `mira serve` with this `.env`...
        2. Open a PR with this diff...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: mira-version
    attributes:
      label: Mira version / commit SHA
      placeholder: "v0.x.y or git SHA"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Self-hosted Docker
        - Self-hosted from source
        - CLI only (no server)
        - Other
    validations:
      required: true

  - type: input
    id: llm
    attributes:
      label: LLM provider + model
      placeholder: "openrouter / anthropic/claude-sonnet-4-6"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Trim to the parts relevant to the bug. Redact tokens, API keys, and
        anything proprietary before pasting.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I've searched existing issues and didn't find a duplicate.
          required: true
        - label: I've redacted any secrets or proprietary code from the logs.
          required: true

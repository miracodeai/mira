name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default-deny token permissions. Each job widens what it actually needs;
# anything else (a malicious dep in CI, a compromised action) can't push
# commits or create releases with the default token.
permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra serve

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check (advisory — non-blocking until codebase is fully typed)
        continue-on-error: true
        run: uv run mypy src/mira/ --ignore-missing-imports

      - name: Test
        run: uv run pytest tests/ -v --ignore=tests/evals --ignore=tests/test_integration.py

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/mira

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/mira/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker:
    # Build the unified UI+backend image and smoke-test it boots. Catches
    # packaging issues (missing extras, broken Dockerfile, bad UI assets)
    # before they hit a release tag.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t mira:ci .

      - name: Smoke test — CLI runs
        run: docker run --rm mira:ci mira --help

      - name: Smoke test — UI assets bundled
        run: docker run --rm mira:ci ls /app/ui_dist/index.html
